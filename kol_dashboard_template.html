<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOL TikTok Dashboard - LOHO House</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#faf6f0; --card:#fff; --primary:#8B4513; --primary-light:#C19A6B;
  --accent:#D2691E; --text:#3a2818; --muted:#8b7766; --border:#e8dcc4;
  --green:#5a8a3a; --red:#c0392b; --gold:#b8860b; --shadow:0 2px 8px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);padding:20px;line-height:1.5}
.container{max-width:1400px;margin:0 auto}
header{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:28px 32px;border-radius:14px;margin-bottom:20px;box-shadow:0 4px 14px rgba(139,69,19,.18)}
header h1{font-size:24px;margin-bottom:6px;font-weight:600}
header .zh{font-weight:400;opacity:.85;margin-right:6px}
header .sub{font-size:13px;opacity:.85}
.tabs{display:flex;gap:6px;background:var(--card);padding:8px;border-radius:12px;margin-bottom:16px;box-shadow:var(--shadow);overflow-x:auto}
.tab{padding:10px 22px;border-radius:8px;background:transparent;border:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);white-space:nowrap;font-family:inherit}
.tab.active{background:var(--primary);color:#fff}
.tab:hover:not(.active){background:var(--bg)}
.filter-bar{background:var(--card);padding:16px 20px;border-radius:12px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.filter-bar .label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.status-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:18px;border:1.5px solid var(--border);background:#fff;font-size:12px;cursor:pointer;user-select:none;font-weight:600;color:var(--muted)}
.pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.range-inputs{display:flex;gap:8px;align-items:center}
.range-inputs input{padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit}
.btn{padding:8px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);font-family:inherit}
.btn:hover{background:var(--bg)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--card);padding:16px 18px;border-radius:10px;border-left:4px solid var(--primary);box-shadow:var(--shadow)}
.kpi .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi .val{font-size:20px;font-weight:700;color:var(--primary)}
.kpi .delta{font-size:11px;margin-top:4px;font-weight:600}
.kpi .delta.up{color:var(--green)}
.kpi .delta.down{color:var(--red)}
.panel{background:var(--card);padding:20px;border-radius:12px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel h2{font-size:15px;margin-bottom:14px;color:var(--primary);border-bottom:2px solid var(--border);padding-bottom:8px;font-weight:600}
.panel h2 .zh{font-weight:400;opacity:.75;margin-right:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.chart-wrap{position:relative;height:300px}
.chart-wrap.tall{height:420px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);text-align:left;padding:10px 12px;font-weight:600;color:var(--primary);border-bottom:2px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:#fdf9f1}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:#e8f3d6;color:var(--green)}
.badge-red{background:#fce4e0;color:var(--red)}
.badge-gold{background:#fdf1d4;color:var(--gold)}
.badge-gray{background:#eee;color:var(--muted)}
.footer{text-align:center;color:var(--muted);font-size:12px;margin-top:20px;padding:12px}
select{padding:7px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="container">

<header>
<h1><span class="zh">KOL 達人 TikTok 營收儀表板</span> Dashboard Doanh Thu KOL TikTok - LOHO House</h1>
<div class="sub">更新時間 Cập nhật: <span id="lastUpdate">__LAST_UPDATE__</span></div>
</header>

<div class="tabs" id="tabs"></div>

<div class="filter-bar">
<span class="label">🏷️ Trạng thái 訂單狀態:</span>
<div class="status-pills" id="statusPills"></div>
<span class="label" style="margin-left:auto">📅 Khoảng ngày:</span>
<div class="range-inputs">
<input type="date" id="dateFrom"> – <input type="date" id="dateTo">
</div>
<button class="btn" onclick="resetFilters()">↻ Reset</button>
</div>

<div id="content"></div>

<div class="footer">
Loho House © 2026 · Dữ liệu: Google Sheets KOL_TikTok_Database_PerMonth
</div>
</div>

<script>
const RAW = "__DATA__";
const MONTHS = "__MONTHS__";
const STATUSES = [...new Set(RAW.map(o=>o.status).filter(Boolean))];

const fmt = n => Math.round(n).toLocaleString('vi-VN');
const fmtK = n => {
  if(Math.abs(n)>=1e9) return (n/1e9).toFixed(2)+' tỷ';
  if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+' tr';
  if(Math.abs(n)>=1e3) return (n/1e3).toFixed(0)+'k';
  return Math.round(n).toString();
};
const fmtPct = n => (n*100).toFixed(1)+'%';

let state = {
  tab: 'overview',
  statuses: new Set(['Đã quyết toán']),
  dateFrom: null, dateTo: null,
  ctFilter: '',
  charts: {}
};

function buildTabs(){
  const tabs = [{id:'overview', label:'總覽 Tổng Quan'}];
  MONTHS.forEach(m => tabs.push({id:'m'+m, label:'Tháng '+m+' / 月'}));
  tabs.push({id:'lookup', label:'🔍 Tra Cứu Theo Ngày'});
  tabs.push({id:'kols', label:'達人 KOL'});
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    '<button class="tab '+(state.tab===t.id?'active':'')+'" data-tab="'+t.id+'">'+t.label+'</button>'
  ).join('');
  document.querySelectorAll('.tab').forEach(el => {
    el.onclick = () => { state.tab = el.dataset.tab; buildTabs(); render(); };
  });
}

function buildStatusPills(){
  document.getElementById('statusPills').innerHTML = STATUSES.map(s =>
    '<div class="pill '+(state.statuses.has(s)?'active':'')+'" data-s="'+s+'">'+s+'</div>'
  ).join('');
  document.querySelectorAll('.pill').forEach(el => {
    el.onclick = () => {
      const s = el.dataset.s;
      if(state.statuses.has(s)) state.statuses.delete(s); else state.statuses.add(s);
      buildStatusPills(); render();
    };
  });
}

function initDateRange(){
  const dates = RAW.map(o=>o.date).filter(Boolean).sort();
  if(dates.length){
    document.getElementById('dateFrom').value = dates[0];
    document.getElementById('dateTo').value = dates[dates.length-1];
    state.dateFrom = dates[0]; state.dateTo = dates[dates.length-1];
  }
}

function resetFilters(){
  state.statuses = new Set(['Đã quyết toán']);
  state.ctFilter = '';
  buildStatusPills();
  initDateRange();
  render();
}

function applyFilters(data, ignoreStatus){
  return data.filter(o => {
    if(!ignoreStatus && state.statuses.size>0 && !state.statuses.has(o.status)) return false;
    if(state.dateFrom && o.date && o.date < state.dateFrom) return false;
    if(state.dateTo && o.date && o.date > state.dateTo) return false;
    return true;
  });
}

function aggSum(arr){
  return {
    orders: arr.length,
    qty: arr.reduce((s,o)=>s+o.qty,0),
    gmv: arr.reduce((s,o)=>s+o.payment,0),
    com: arr.reduce((s,o)=>s+o.com,0),
    kols: new Set(arr.map(o=>o.kol)).size,
  };
}
function aggBy(arr, keyFn){
  const m = {};
  arr.forEach(o => {
    const k = keyFn(o);
    if(!m[k]) m[k] = {key:k, orders:0, qty:0, gmv:0, com:0};
    m[k].orders++; m[k].qty+=o.qty; m[k].gmv+=o.payment; m[k].com+=o.com;
  });
  return Object.values(m);
}

function kpiCard(lab, val, delta){
  let d = '';
  if(delta !== undefined && delta !== null){
    const arrow = delta>=0?'▲':'▼';
    const cls = delta>=0?'up':'down';
    d = '<div class="delta '+cls+'">'+arrow+' '+Math.abs(delta*100).toFixed(1)+'% vs trước</div>';
  }
  return '<div class="kpi"><div class="lab">'+lab+'</div><div class="val">'+val+'</div>'+d+'</div>';
}

function destroyChart(name){
  if(state.charts[name]){ state.charts[name].destroy(); delete state.charts[name]; }
}

function mkChart(id, name, cfg){
  destroyChart(name);
  const el = document.getElementById(id);
  if(!el) return;
  state.charts[name] = new Chart(el, cfg);
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// === OVERVIEW ===
function renderOverview(){
  const data = applyFilters(RAW);
  const totals = aggSum(data);
  const aov = totals.orders ? totals.gmv/totals.orders : 0;
  const comRate = totals.gmv ? totals.com/totals.gmv : 0;

  let html = '<div class="kpi-grid">';
  html += kpiCard('GMV 總營收','<span style="font-size:18px">'+fmt(totals.gmv)+'đ</span>');
  html += kpiCard('Số đơn 訂單', fmt(totals.orders));
  html += kpiCard('Hoa hồng 佣金','<span style="font-size:18px">'+fmt(totals.com)+'đ</span>');
  html += kpiCard('AOV 客單價','<span style="font-size:16px">'+fmt(aov)+'đ</span>');
  html += kpiCard('% HH/GMV', fmtPct(comRate));
  html += kpiCard('KOL 達人', fmt(totals.kols));
  html += '</div>';

  // ① Bảng chi tiết tăng trưởng - có filter loại nội dung
  const ctList = [...new Set(RAW.map(o=>o.ct).filter(Boolean))];
  let ctOpts = '<option value="">Tất cả / 全部</option>';
  ctList.forEach(c => {
    ctOpts += '<option value="'+escHtml(c)+'"'+(state.ctFilter===c?' selected':'')+'>'+escHtml(c)+'</option>';
  });

  html += '<div class="panel"><h2><span class="zh">① 月度成長明細</span>Chi tiết tăng trưởng từng tháng</h2>';
  html += '<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">';
  html += '<span style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px">🎬 Loại nội dung 內容類型:</span>';
  html += '<select id="ctFilterSel">'+ctOpts+'</select>';
  html += '</div>';

  const dataForTable = state.ctFilter ? data.filter(o=>o.ct===state.ctFilter) : data;
  const byMonth = aggBy(dataForTable, o => o.month).sort((a,b)=>a.key-b.key);

  html += '<table><thead><tr><th>月份 Tháng</th><th class="num">營收 Doanh Thu (đ)</th><th class="num">訂單數 Đơn Hàng</th><th class="num">銷量 SL</th><th class="num">客單價 AOV (đ)</th><th class="num">佣金 (đ)</th><th class="num">環比 GMV</th><th class="num">環比 Đơn</th></tr></thead><tbody>';
  let prev = null;
  byMonth.forEach(r => {
    const aov2 = r.orders ? r.gmv/r.orders : 0;
    let momGmv = '<span class="badge badge-gray">—</span>';
    let momOrd = '<span class="badge badge-gray">—</span>';
    if(prev && prev.gmv>0){
      const p = (r.gmv-prev.gmv)/prev.gmv;
      momGmv = '<span class="badge badge-'+(p>=0?'green':'red')+'">'+(p>=0?'▲':'▼')+' '+Math.abs(p*100).toFixed(1)+'%</span>';
    }
    if(prev && prev.orders>0){
      const po = (r.orders-prev.orders)/prev.orders;
      momOrd = '<span class="badge badge-'+(po>=0?'green':'red')+'">'+(po>=0?'▲':'▼')+' '+Math.abs(po*100).toFixed(1)+'%</span>';
    }
    prev = r;
    html += '<tr><td><strong>T'+r.key+'</strong></td><td class="num">'+fmt(r.gmv)+'</td><td class="num">'+fmt(r.orders)+'</td><td class="num">'+fmt(r.qty)+'</td><td class="num">'+fmt(aov2)+'</td><td class="num">'+fmt(r.com)+'</td><td class="num">'+momGmv+'</td><td class="num">'+momOrd+'</td></tr>';
  });
  html += '</tbody></table></div>';

  // ②③ Charts
  const byMonthAll = aggBy(data, o => o.month).sort((a,b)=>a.key-b.key);
  html += '<div class="grid-2">';
  html += '<div class="panel"><h2><span class="zh">② 各月份營收比較</span>So sánh doanh thu các tháng</h2><div class="chart-wrap"><canvas id="cMonth"></canvas></div></div>';
  html += '<div class="panel"><h2><span class="zh">③ 各月份訂單比較</span>So sánh đơn hàng các tháng</h2><div class="chart-wrap"><canvas id="cMonthOrders"></canvas></div></div>';
  html += '</div>';

  // ④ Status
  html += '<div class="panel"><h2><span class="zh">④ 訂單狀態分布</span>Phân bổ theo trạng thái đơn</h2><div class="chart-wrap"><canvas id="cStatus"></canvas></div></div>';

  // ⑤ Top KOL
  const byKol = aggBy(data, o=>o.kol).filter(r=>r.key).sort((a,b)=>b.gmv-a.gmv);
  html += '<div class="panel"><h2><span class="zh">⑤ Top 15 達人 KOL</span>Top 15 KOL theo doanh thu</h2><div class="chart-wrap tall"><canvas id="cKol"></canvas></div></div>';

  // ⑥ KOL detail
  html += '<div class="panel"><h2><span class="zh">⑥ 達人詳細排名 Top 10</span>Bảng chi tiết KOL (Top 10)</h2>';
  html += '<table><thead><tr><th>#</th><th>KOL</th><th class="num">Đơn</th><th class="num">SL</th><th class="num">GMV (đ)</th><th class="num">Hoa hồng (đ)</th><th class="num">AOV (đ)</th></tr></thead><tbody>';
  byKol.slice(0,10).forEach((r,i) => {
    const aov3 = r.orders ? r.gmv/r.orders : 0;
    const rank = i<3 ? '<span class="badge badge-gold">#'+(i+1)+'</span>' : (i+1);
    html += '<tr><td>'+rank+'</td><td><strong>'+escHtml(r.key)+'</strong></td><td class="num">'+fmt(r.orders)+'</td><td class="num">'+fmt(r.qty)+'</td><td class="num">'+fmt(r.gmv)+'</td><td class="num">'+fmt(r.com)+'</td><td class="num">'+fmt(aov3)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  // ⑦ Loai noi dung
  const byCt = aggBy(data, o=>o.ct || '(trống)').sort((a,b)=>b.gmv-a.gmv);
  html += '<div class="panel"><h2><span class="zh">⑦ 內容類型分析</span>Phân tích theo loại nội dung</h2>';
  html += '<table><thead><tr><th>Loại nội dung</th><th class="num">Đơn</th><th class="num">GMV (đ)</th><th class="num">Hoa hồng (đ)</th><th class="num">% GMV</th></tr></thead><tbody>';
  byCt.forEach(r => {
    html += '<tr><td><strong>'+escHtml(r.key)+'</strong></td><td class="num">'+fmt(r.orders)+'</td><td class="num">'+fmt(r.gmv)+'</td><td class="num">'+fmt(r.com)+'</td><td class="num">'+fmtPct(totals.gmv?r.gmv/totals.gmv:0)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  // ⑧ Top SP
  const byProd = aggBy(data, o=>o.product || '(trống)').sort((a,b)=>b.gmv-a.gmv);
  html += '<div class="panel"><h2><span class="zh">⑧ 暢銷產品 Top 10</span>Top 10 sản phẩm bán chạy</h2>';
  html += '<table><thead><tr><th>#</th><th>Sản phẩm</th><th class="num">SL</th><th class="num">GMV (đ)</th></tr></thead><tbody>';
  byProd.slice(0,10).forEach((r,i) => {
    const name = r.key.length>90 ? r.key.substring(0,90)+'...' : r.key;
    html += '<tr><td>'+(i+1)+'</td><td>'+escHtml(name)+'</td><td class="num">'+fmt(r.qty)+'</td><td class="num">'+fmt(r.gmv)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  document.getElementById('content').innerHTML = html;

  const ctSel = document.getElementById('ctFilterSel');
  if(ctSel) ctSel.onchange = e => { state.ctFilter = e.target.value; render(); };

  mkChart('cMonth','month',{
    type:'bar',
    data:{
      labels: byMonthAll.map(r=>'T'+r.key),
      datasets:[
        {label:'GMV', data: byMonthAll.map(r=>r.gmv), backgroundColor:'#8B4513', borderRadius:6},
        {label:'Hoa hồng', data: byMonthAll.map(r=>r.com), backgroundColor:'#D2691E', borderRadius:6}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top'},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.parsed.y)+'đ'}}},
      scales:{y:{ticks:{callback:v=>fmtK(v)}}}}
  });

  mkChart('cMonthOrders','monthOrders',{
    type:'bar',
    data:{
      labels: byMonthAll.map(r=>'T'+r.key),
      datasets:[
        {label:'Số đơn 訂單', data: byMonthAll.map(r=>r.orders), backgroundColor:'#5a8a3a', borderRadius:6},
        {label:'Số lượng SP 銷量', data: byMonthAll.map(r=>r.qty), backgroundColor:'#b8860b', borderRadius:6}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top'},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.parsed.y)}}},
      scales:{y:{ticks:{callback:v=>fmt(v)}}}}
  });

  // Status
  const statusData = applyFilters(RAW, true);
  const byStatus = {};
  statusData.forEach(o => {
    if(!byStatus[o.status]) byStatus[o.status] = {count:0, gmv:0};
    byStatus[o.status].count++; byStatus[o.status].gmv += o.payment;
  });
  const sLabels = Object.keys(byStatus);
  mkChart('cStatus','status',{
    type:'doughnut',
    data:{
      labels: sLabels.map(l => l+' ('+fmt(byStatus[l].count)+')'),
      datasets:[{data: sLabels.map(l=>byStatus[l].gmv), backgroundColor:['#5a8a3a','#c0392b','#b8860b','#8B4513','#C19A6B']}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>c.label+': '+fmt(c.parsed)+'đ'}}}}
  });

  // Top KOL chart
  const top = byKol.slice(0,15);
  mkChart('cKol','kol',{
    type:'bar',
    data:{labels: top.map(r=>r.key), datasets:[{label:'GMV', data: top.map(r=>r.gmv), backgroundColor:'#8B4513', borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.x)+'đ'}}},
      scales:{x:{ticks:{callback:v=>fmtK(v)}}}}
  });
}

// === MONTH ===
function renderMonth(m){
  const monthData = RAW.filter(o => o.month===m && (state.statuses.size===0 || state.statuses.has(o.status)));
  const prevData = RAW.filter(o => o.month===m-1 && (state.statuses.size===0 || state.statuses.has(o.status)));
  const t = aggSum(monthData);
  const p = aggSum(prevData);
  const aov = t.orders ? t.gmv/t.orders : 0;
  const pAov = p.orders ? p.gmv/p.orders : 0;
  const dGmv = p.gmv>0 ? (t.gmv-p.gmv)/p.gmv : null;
  const dOrders = p.orders>0 ? (t.orders-p.orders)/p.orders : null;
  const dAov = pAov>0 ? (aov-pAov)/pAov : null;
  const dCom = p.com>0 ? (t.com-p.com)/p.com : null;

  let html = '<div style="font-size:14px;color:var(--muted);margin:-4px 0 12px;padding:0 4px">📅 <strong>Tháng '+m+'</strong> · so sánh với <strong>Tháng '+(m-1)+'</strong>'+(m===MONTHS[0]?' (chưa có)':'')+'</div>';
  html += '<div class="kpi-grid">';
  html += kpiCard('GMV 總營收','<span style="font-size:18px">'+fmt(t.gmv)+'đ</span>', dGmv);
  html += kpiCard('Số đơn 訂單', fmt(t.orders), dOrders);
  html += kpiCard('Hoa hồng 佣金','<span style="font-size:18px">'+fmt(t.com)+'đ</span>', dCom);
  html += kpiCard('AOV 客單價','<span style="font-size:16px">'+fmt(aov)+'đ</span>', dAov);
  html += kpiCard('KOL 達人', fmt(t.kols));
  html += kpiCard('SL bán 銷量', fmt(t.qty));
  html += '</div>';

  const byDay = aggBy(monthData, o=>o.date).filter(r=>r.key).sort((a,b)=>a.key.localeCompare(b.key));
  html += '<div class="panel"><h2><span class="zh">② 每日營收圖表</span>Doanh thu theo ngày trong tháng '+m+'</h2><div class="chart-wrap"><canvas id="cDay"></canvas></div></div>';
  html += '<div class="panel"><h2><span class="zh">③ 各月份營收比較</span>So sánh với các tháng khác</h2><div class="chart-wrap"><canvas id="cMCompare"></canvas></div></div>';

  const byKol = aggBy(monthData, o=>o.kol).filter(r=>r.key).sort((a,b)=>b.gmv-a.gmv);
  html += '<div class="panel"><h2><span class="zh">④ Top 10 達人 Tháng '+m+'</span>Top 10 KOL trong tháng</h2>';
  html += '<table><thead><tr><th>#</th><th>KOL</th><th class="num">Đơn</th><th class="num">SL</th><th class="num">GMV (đ)</th><th class="num">Hoa hồng (đ)</th><th class="num">AOV (đ)</th></tr></thead><tbody>';
  byKol.slice(0,10).forEach((r,i)=>{
    const aov2 = r.orders ? r.gmv/r.orders : 0;
    const rank = i<3 ? '<span class="badge badge-gold">#'+(i+1)+'</span>' : (i+1);
    html += '<tr><td>'+rank+'</td><td><strong>'+escHtml(r.key)+'</strong></td><td class="num">'+fmt(r.orders)+'</td><td class="num">'+fmt(r.qty)+'</td><td class="num">'+fmt(r.gmv)+'</td><td class="num">'+fmt(r.com)+'</td><td class="num">'+fmt(aov2)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  const byCt = aggBy(monthData, o=>o.ct || '(trống)').sort((a,b)=>b.gmv-a.gmv);
  html += '<div class="panel"><h2><span class="zh">⑤ 內容類型 Tháng '+m+'</span>Phân tích loại nội dung</h2>';
  html += '<table><thead><tr><th>Loại</th><th class="num">Đơn</th><th class="num">GMV (đ)</th><th class="num">% GMV</th></tr></thead><tbody>';
  byCt.forEach(r=>{
    html += '<tr><td><strong>'+escHtml(r.key)+'</strong></td><td class="num">'+fmt(r.orders)+'</td><td class="num">'+fmt(r.gmv)+'</td><td class="num">'+fmtPct(t.gmv?r.gmv/t.gmv:0)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  const allMonth = RAW.filter(o => o.month===m);
  const byS = {};
  allMonth.forEach(o => {
    if(!byS[o.status]) byS[o.status] = {orders:0, gmv:0};
    byS[o.status].orders++; byS[o.status].gmv += o.payment;
  });
  html += '<div class="panel"><h2><span class="zh">⑥ 訂單狀態 Tháng '+m+'</span>Phân bổ trạng thái đơn (toàn bộ tháng, không lọc theo filter trên)</h2>';
  html += '<table><thead><tr><th>Trạng thái</th><th class="num">Đơn</th><th class="num">GMV (đ)</th><th class="num">% GMV</th></tr></thead><tbody>';
  const monthTotalGmv = Object.values(byS).reduce((s,v)=>s+v.gmv,0);
  Object.entries(byS).sort((a,b)=>b[1].gmv-a[1].gmv).forEach(([k,v])=>{
    html += '<tr><td><strong>'+escHtml(k)+'</strong></td><td class="num">'+fmt(v.orders)+'</td><td class="num">'+fmt(v.gmv)+'</td><td class="num">'+fmtPct(monthTotalGmv?v.gmv/monthTotalGmv:0)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  const byProd = aggBy(monthData, o=>o.product || '(trống)').sort((a,b)=>b.gmv-a.gmv);
  html += '<div class="panel"><h2><span class="zh">⑦ 暢銷產品</span>Top 10 sản phẩm bán chạy</h2>';
  html += '<table><thead><tr><th>#</th><th>Sản phẩm</th><th class="num">SL</th><th class="num">GMV (đ)</th></tr></thead><tbody>';
  byProd.slice(0,10).forEach((r,i)=>{
    const name = r.key.length>90 ? r.key.substring(0,90)+'...' : r.key;
    html += '<tr><td>'+(i+1)+'</td><td>'+escHtml(name)+'</td><td class="num">'+fmt(r.qty)+'</td><td class="num">'+fmt(r.gmv)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  document.getElementById('content').innerHTML = html;

  mkChart('cDay','day',{
    type:'line',
    data:{
      labels: byDay.map(r=>r.key.slice(5)),
      datasets:[{label:'GMV', data: byDay.map(r=>r.gmv), borderColor:'#8B4513', backgroundColor:'rgba(139,69,19,.15)', tension:.3, fill:true}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)+'đ'}}},
      scales:{y:{ticks:{callback:v=>fmtK(v)}}}}
  });

  const allMonthsAgg = MONTHS.map(mm => {
    const d = RAW.filter(o => o.month===mm && (state.statuses.size===0 || state.statuses.has(o.status)));
    return {m:mm, gmv: d.reduce((s,o)=>s+o.payment,0)};
  });
  mkChart('cMCompare','mc',{
    type:'bar',
    data:{
      labels: allMonthsAgg.map(r=>'T'+r.m),
      datasets:[{label:'GMV', data: allMonthsAgg.map(r=>r.gmv),
        backgroundColor: allMonthsAgg.map(r=>r.m===m?'#D2691E':'#C19A6B'), borderRadius:6}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)+'đ'}}},
      scales:{y:{ticks:{callback:v=>fmtK(v)}}}}
  });
}

// === LOOKUP ===
function renderLookup(){
  const data = applyFilters(RAW);
  const t = aggSum(data);
  const aov = t.orders ? t.gmv/t.orders : 0;

  let html = '<div style="font-size:13px;color:var(--muted);margin:-4px 0 12px;padding:0 4px">📅 Khoảng: <strong>'+(state.dateFrom||'?')+'</strong> → <strong>'+(state.dateTo||'?')+'</strong> · Trạng thái: <strong>'+([...state.statuses].join(', ') || 'Tất cả')+'</strong></div>';
  html += '<div class="kpi-grid">';
  html += kpiCard('GMV','<span style="font-size:18px">'+fmt(t.gmv)+'đ</span>');
  html += kpiCard('Số đơn', fmt(t.orders));
  html += kpiCard('Hoa hồng','<span style="font-size:18px">'+fmt(t.com)+'đ</span>');
  html += kpiCard('AOV','<span style="font-size:16px">'+fmt(aov)+'đ</span>');
  html += kpiCard('KOL', fmt(t.kols));
  html += kpiCard('SL bán', fmt(t.qty));
  html += '</div>';

  const byDay = aggBy(data, o=>o.date).filter(r=>r.key).sort((a,b)=>a.key.localeCompare(b.key));
  html += '<div class="panel"><h2><span class="zh">營收趨勢</span>Xu hướng doanh thu theo ngày</h2><div class="chart-wrap"><canvas id="cDayL"></canvas></div></div>';

  const byKol = aggBy(data, o=>o.kol).filter(r=>r.key).sort((a,b)=>b.gmv-a.gmv);
  html += '<div class="panel"><h2><span class="zh">達人排名</span>Top KOL trong kỳ</h2>';
  html += '<table><thead><tr><th>#</th><th>KOL</th><th class="num">Đơn</th><th class="num">SL</th><th class="num">GMV (đ)</th><th class="num">Hoa hồng (đ)</th></tr></thead><tbody>';
  byKol.slice(0,30).forEach((r,i)=>{
    const rank = i<3 ? '<span class="badge badge-gold">#'+(i+1)+'</span>' : (i+1);
    html += '<tr><td>'+rank+'</td><td><strong>'+escHtml(r.key)+'</strong></td><td class="num">'+fmt(r.orders)+'</td><td class="num">'+fmt(r.qty)+'</td><td class="num">'+fmt(r.gmv)+'</td><td class="num">'+fmt(r.com)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  html += '<div class="panel"><h2><span class="zh">每日明細</span>Chi tiết theo ngày</h2>';
  html += '<table><thead><tr><th>Ngày</th><th class="num">Đơn</th><th class="num">SL</th><th class="num">GMV (đ)</th><th class="num">Hoa hồng (đ)</th><th class="num">AOV (đ)</th></tr></thead><tbody>';
  byDay.forEach(r=>{
    const a2 = r.orders ? r.gmv/r.orders : 0;
    html += '<tr><td><strong>'+r.key+'</strong></td><td class="num">'+fmt(r.orders)+'</td><td class="num">'+fmt(r.qty)+'</td><td class="num">'+fmt(r.gmv)+'</td><td class="num">'+fmt(r.com)+'</td><td class="num">'+fmt(a2)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  document.getElementById('content').innerHTML = html;

  mkChart('cDayL','dayL',{
    type:'line',
    data:{
      labels: byDay.map(r=>r.key),
      datasets:[{label:'GMV', data: byDay.map(r=>r.gmv), borderColor:'#8B4513', backgroundColor:'rgba(139,69,19,.15)', tension:.3, fill:true}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)+'đ'}}},
      scales:{y:{ticks:{callback:v=>fmtK(v)}}}}
  });
}

// === KOLS ===
function renderKols(){
  const data = applyFilters(RAW);
  const byKol = aggBy(data, o=>o.kol).filter(r=>r.key).sort((a,b)=>b.gmv-a.gmv);

  let html = '<div class="panel"><h2><span class="zh">達人完整排名</span>Toàn bộ KOL ('+byKol.length+')</h2>';
  html += '<table><thead><tr><th>#</th><th>KOL TikTok</th><th class="num">Đơn</th><th class="num">SL</th><th class="num">GMV (đ)</th><th class="num">Hoa hồng (đ)</th><th class="num">AOV (đ)</th><th class="num">%HH</th></tr></thead><tbody>';
  byKol.forEach((r,i)=>{
    const aov = r.orders ? r.gmv/r.orders : 0;
    const rate = r.gmv ? r.com/r.gmv : 0;
    const rank = i<3 ? '<span class="badge badge-gold">#'+(i+1)+'</span>' : (i+1);
    html += '<tr><td>'+rank+'</td><td><strong>'+escHtml(r.key)+'</strong></td><td class="num">'+fmt(r.orders)+'</td><td class="num">'+fmt(r.qty)+'</td><td class="num">'+fmt(r.gmv)+'</td><td class="num">'+fmt(r.com)+'</td><td class="num">'+fmt(aov)+'</td><td class="num">'+fmtPct(rate)+'</td></tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById('content').innerHTML = html;
}

function render(){
  state.dateFrom = document.getElementById('dateFrom').value || null;
  state.dateTo = document.getElementById('dateTo').value || null;
  Object.keys(state.charts).forEach(destroyChart);
  if(state.tab==='overview') renderOverview();
  else if(state.tab==='lookup') renderLookup();
  else if(state.tab==='kols') renderKols();
  else if(state.tab.startsWith('m')) renderMonth(parseInt(state.tab.slice(1)));
}

document.getElementById('dateFrom').addEventListener('change', render);
document.getElementById('dateTo').addEventListener('change', render);

buildTabs();
buildStatusPills();
initDateRange();
render();
</script>
</body>
